# Render Blueprint for the MemoryMate API (FastAPI).
# In Render: New > Blueprint > connect this repo. Set the values marked "sync: false"
# (MONGO_URL, EMERGENT_LLM_KEY, CORS_ORIGINS) in the dashboard after the first deploy.
services:
  - type: web
    name: memorymate-api
    runtime: python
    plan: free
    rootDir: backend
    # emergentintegrations is NOT on PyPI — pull it from Emergent's public index.
    buildCommand: pip install -r requirements.txt --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DB_NAME
        value: memorymate
      - key: JWT_SECRET
        generateValue: true
      # Open demo login (any role, no password) + demo seed data. Great for showing
      # the app off; set to "false" before onboarding real users.
      - key: ENABLE_DEMO
        value: "true"
      # MongoDB Atlas connection string, e.g. mongodb+srv://user:pass@cluster.xxxx.mongodb.net
      - key: MONGO_URL
        sync: false
      # Your Vercel frontend origin(s), comma-separated, e.g. https://memorymate.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # Emergent universal AI key (or use ANTHROPIC_API_KEY / OPENAI_API_KEY instead).
      - key: EMERGENT_LLM_KEY
        sync: false
      # --- optional cost controls ---
      # - key: CAPTURE_MODEL_PROVIDER
      #   value: openai
      # - key: CAPTURE_MODEL_NAME
      #   value: gpt-4o-mini
      # - key: DAILY_AI_COST_CAP_USD
      #   value: "0.50"
      # --- optional WhatsApp bot (Meta Cloud API) ---
      # - key: WHATSAPP_VERIFY_TOKEN
      #   sync: false
      # - key: WHATSAPP_ACCESS_TOKEN
      #   sync: false
      # - key: WHATSAPP_PHONE_NUMBER_ID
      #   sync: false
      # - key: WHATSAPP_APP_SECRET
      #   sync: false
      # - key: WHATSAPP_REMINDER_TEMPLATE
      #   sync: false
      # - key: CRON_SECRET
      #   generateValue: true
